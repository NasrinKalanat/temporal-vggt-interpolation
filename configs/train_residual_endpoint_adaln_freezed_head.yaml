# Temporal Residual Endpoint — Frozen Point Head + Cached Feature Supervision
#
# The VGGT point head is completely frozen and removed from memory.
# Training supervises the temporal model directly on the 4 cached VGGT layers
# using LayerNorm + SmoothL1 + cosine loss on patch tokens only.
#
# See docs/training.md for full specification.

triplets_path: prepared_data/subsets/benchmark_triplets.json
vggt_output_root: vggt_outputs/t1t2_paired_v16_o8
output_root: runs/residual_endpoint_t1t2_paired_v16_o8_adaln_1layer_freezed_head_cam

vggt_inference_mode: precomputed

protocols:
  - strict

crops:
  - corn

test_date: "20230831"

seed: 42
image_preprocess_mode: pad
conf_threshold: 0.02
feature_cache_root: /home/ec2-user/workspace/canopy-org/vggt_cache

# ---------------------------------------------------------------------------
# Frozen point head — skip DPTHead forward, free GPU memory
# ---------------------------------------------------------------------------
freeze_point_head: true

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
epochs: 50
batch_size: 1
num_workers: 2
val_every: 1
device: cuda:0
grad_clip: 1.0

# ---------------------------------------------------------------------------
# Early stopping
# ---------------------------------------------------------------------------
early_stopping:
  patience: 10
  min_delta: 1.0e-4

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  lr: 1.0e-5
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

# ---------------------------------------------------------------------------
# LR scheduler
# ---------------------------------------------------------------------------
scheduler:
  warmup_epochs: 5
  min_lr: 1.0e-6

# ---------------------------------------------------------------------------
# Loss — cached feature supervision (no pointmap loss)
# ---------------------------------------------------------------------------
loss:
  # Pointmap loss disabled
  pointmap_weight: 0.0

  # Cached feature loss (main supervision)
  cache_weight: 1.0
  cache_smooth_l1_beta: 0.1
  cache_cos_weight: 0.1
  cache_normalize: true
  cache_patch_only: true

  # Regularization
  delta_reg_weight: 0
  gate_reg_weight: 0

# ---------------------------------------------------------------------------
# Teacher confidence handling (unused when pointmap_weight=0, kept for reference)
# ---------------------------------------------------------------------------
teacher:
  conf_mask_threshold: 0.02
  conf_threshold_type: absolute
  use_weighted_reg_loss: false
  weight_clip_min: 0.25
  weight_clip_max: 4.0

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_module: models.temporal_vggt_residual_endpoint
model_class: TemporalResidualEndpoint
model_kwargs:
  vggt_model_id: facebook/VGGT-1B
  embed_dim: 1024
  num_query_views: 16

  # Temporal transformer
  num_transformer_layers: 1
  num_transformer_heads: 8
  mlp_ratio: 2.0
  dropout: 0.1
  d_model_down_proj: 512

  # Time conditioning
  time_conditioning_mode: residual_adaln
  time_hidden_dim: 256

  # Camera conditioning
  use_camera_cond: true
  camera_hidden_dim: 256

  # Spatial attention
  use_rope_in_self_attention: true

  # Point head (will be frozen and removed, but needed for init)
  init_point_head_from_vggt: true
  cache_layers: [4, 11, 17, 23]
  point_head_mode: full

  # Memory
  use_gradient_checkpoint: false
