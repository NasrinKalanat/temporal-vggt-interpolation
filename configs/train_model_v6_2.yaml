# Temporal-VGGT v6 training config
# Date-local global attention + gated time self-attention block.
#
# Key design:
#   - VGGT frame blocks: same as original (all views, independent).
#   - VGGT global blocks: date-LOCAL (t1, t2q, t3 attend only within their group).
#   - TimeSelfAttention + TimeMLP at time_block_layers: all views interact cross-date.
#   - Conditioning applied at conditioning_before_layers and/or before each time block.
#
# NOTE: vggt_inference_mode must be "live" — v6 modifies the aggregator internals.

triplets_path: prepared_data/subsets/benchmark_triplets.json
vggt_output_root: vggt_outputs/camera_consistent_triplets_v16_o4
output_root: runs/model_v6_camera_consistent_v16_o4_time_addition

# ---------------------------------------------------------------------------
# VGGT inference mode
# ---------------------------------------------------------------------------
vggt_inference_mode: precomputed

protocols:
  - strict

crops:
  - corn

test_date: "20230831"

seed: 42
image_preprocess_mode: pad
conf_threshold: 0.02

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
epochs: 50
batch_size: 1
num_workers: 2
val_every: 1
device: cuda:0
grad_clip: 1.0
gradient_checkpointing: true

# ---------------------------------------------------------------------------
# Early stopping
# ---------------------------------------------------------------------------
early_stopping:
  patience: 15
  min_delta: 1.0e-4

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]

# ---------------------------------------------------------------------------
# LR scheduler
# ---------------------------------------------------------------------------
scheduler:
  warmup_epochs: 2
  min_lr: 1.0e-6

# ---------------------------------------------------------------------------
# Point-map loss
# ---------------------------------------------------------------------------
loss:
  alpha: 0.2
  lambda_grad: 1.0
  use_gradient_loss: true
  pred_conf_clamp_min: 1.0e-6
  pred_conf_clamp_max: 100.0

# ---------------------------------------------------------------------------
# Teacher confidence handling
# ---------------------------------------------------------------------------
teacher:
  conf_mask_threshold: 0.02
  conf_threshold_type: absolute
  use_weighted_reg_loss: false
  weight_clip_min: 0.25
  weight_clip_max: 4.0

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_module: models.temporal_vggt_v6
model_class: TemporalVGGTv6
model_kwargs:
  vggt_model_id: facebook/VGGT-1B
  embed_dim: 1024
  num_query_views: 16
  time_conditioning_mode: additive          # "film" | "residual_adaln"
  camera_conditioning_mode: none                  # "none" | "film" | "residual_adaln" | "additive"
  time_hidden_dim: 128
  camera_hidden_dim: 256
  time_block_layers: [23]                         # layers where TimeBlock is injected
  time_block_heads: 8
  time_block_mlp_ratio: 4.0
  time_block_dropout: 0.0
  conditioning_before_layers: []                 # condition before these aggregator layers
                                                  # [0]         -> once before the first layer (like v5)
                                                  # [0, 17, 23] -> also recondition late
  conditioning_before_time_blocks: true           # also condition immediately before each time block
  cache_layers: [4, 11, 17, 23]                  # must have exactly 4 entries for DPTHead
  init_point_head_from_vggt: true                 # initialize DPTHead from pretrained VGGT

