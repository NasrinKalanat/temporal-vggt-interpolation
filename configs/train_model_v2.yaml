# Temporal-VGGT v2 training config
# Same as v1 but with block-level time conditioning at each LoRA-adapted aggregator block.
# time_conditioning_mode controls both patch-level and block-level conditioning.

triplets_path: prepared_data/subsets/benchmark_triplets.json
vggt_output_root: vggt_outputs/camera_consistent_triplets_v16_o4
output_root: runs/model_v2_camera_consistent_v16_o4

# ---------------------------------------------------------------------------
# VGGT inference mode
# ---------------------------------------------------------------------------
vggt_inference_mode: precomputed   # "precomputed" | "live"
# When vggt_inference_mode: live, set these:
# all_triplets_path: prepared_data/all_triplets.json
# vggt_device: cuda:1        # separate device for VGGT (can differ from training device)
# vggt_model_id: facebook/VGGT-1B
# n_views: 8
# max_overlap_views: 2
# max_variants: null
# NOTE: live mode forces num_workers=0 and skips patch embedding cache

protocols:
  # - target_date
  - strict

crops:
  - corn
  # - soybean

test_date: "20230831"

seed: 42
image_preprocess_mode: pad
conf_threshold: 0.02

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
epochs: 50
batch_size: 1
num_workers: 2
val_every: 5
device: cuda:0
grad_clip: 1.0

# ---------------------------------------------------------------------------
# Early stopping
# ---------------------------------------------------------------------------
early_stopping:
  patience: 3
  min_delta: 1.0e-4

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]

# ---------------------------------------------------------------------------
# LR scheduler
# ---------------------------------------------------------------------------
scheduler:
  warmup_epochs: 2
  min_lr: 1.0e-6

# ---------------------------------------------------------------------------
# Point-map loss
# ---------------------------------------------------------------------------
loss:
  alpha: 0.2
  lambda_grad: 1.0
  use_gradient_loss: true
  pred_conf_clamp_min: 1.0e-6
  pred_conf_clamp_max: 100.0

# ---------------------------------------------------------------------------
# Camera pose loss
# ---------------------------------------------------------------------------
camera_loss:
  lambda_camera: 0.1
  gamma: 0.6
  weight_trans: 1.0
  weight_rot: 1.0
  weight_focal: 0.5

# ---------------------------------------------------------------------------
# Teacher confidence handling
# ---------------------------------------------------------------------------
teacher:
  conf_mask_threshold: 0.02
  conf_threshold_type: absolute
  use_weighted_reg_loss: false
  weight_clip_min: 0.25
  weight_clip_max: 4.0

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_module: models.temporal_vggt_v2
model_class: TemporalVGGTv2
model_kwargs:
  vggt_model_id: facebook/VGGT-1B
  embed_dim: 1024
  num_query_views: 1
  query_patch_h: 37
  query_patch_w: 37
  query_grid_std: 0.02
  time_conditioning_mode: residual_adaln   # controls both patch-level and block-level
  lora_rank: 4
  lora_alpha: 8.0
  lora_dropout: 0.05
  lora_frame_layers: [20, 21, 22, 23]
  lora_global_layers: [16, 17, 18, 19, 20, 21, 22, 23]
  init_point_head_from_vggt: false
  use_camera_conditioning: false
  use_camera_head: true

