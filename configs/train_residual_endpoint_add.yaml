# Temporal Residual Endpoint Transformer training config
#
# Architecture: frozen VGGT runs separately on t1 and t3 endpoints.
# f1 features (t1 canvas) are updated by a temporal transformer that attends
# to f3 features via self-attention (t1 tokens) + cross-attention (to t3) + MLP.
# Transformer output is converted to a delta by subtracting its input query.
# The delta is added to f1 through a small per-layer gate (init=1e-3).
#
# No learnable t2 query tokens. No adapter projections. Transformer operates
# at VGGT dim D=2C=2048 directly. Teacher targets must match t1 camera views.

triplets_path: prepared_data/subsets/benchmark_triplets.json
vggt_output_root: vggt_outputs/t1t2_paired_v16_o8
output_root: runs/residual_endpoint_t1t2_paired_v16_o8_add_1layer

vggt_inference_mode: precomputed

protocols:
  - strict

crops:
  - corn

test_date: "20230831"

seed: 42
image_preprocess_mode: pad
conf_threshold: 0.02

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
epochs: 50
batch_size: 1
num_workers: 2
val_every: 2
device: cuda:1
grad_clip: 1.0

# ---------------------------------------------------------------------------
# Early stopping
# ---------------------------------------------------------------------------
early_stopping:
  patience: 15
  min_delta: 1.0e-4

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]

# ---------------------------------------------------------------------------
# LR scheduler
# ---------------------------------------------------------------------------
scheduler:
  warmup_epochs: 2
  min_lr: 1.0e-6

# ---------------------------------------------------------------------------
# Point-map loss
# ---------------------------------------------------------------------------
loss:
  alpha: 0.2
  lambda_grad: 1.0
  use_gradient_loss: true
  pred_conf_clamp_min: 1.0e-6
  pred_conf_clamp_max: 100.0

# ---------------------------------------------------------------------------
# Teacher confidence handling
# ---------------------------------------------------------------------------
teacher:
  conf_mask_threshold: 0.02
  conf_threshold_type: absolute
  use_weighted_reg_loss: false
  weight_clip_min: 0.25
  weight_clip_max: 4.0

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_module: models.temporal_vggt_residual_endpoint
model_class: TemporalResidualEndpoint
model_kwargs:
  vggt_model_id: facebook/VGGT-1B
  embed_dim: 1024               # VGGT-1B token dim; D = 2C = 2048 (do not change)
  num_query_views: 16           # controls dataset loader; not used by this model's forward

  # Temporal transformer
  # Operates at D=2048. num_transformer_heads must divide 2048.
  # 16 heads → head_dim=128  (recommended)
  #  8 heads → head_dim=256  (cheaper, fewer params)
  num_transformer_layers: 1
  num_transformer_heads: 16
  mlp_ratio: 4.0
  dropout: 0.0

  # Time conditioning (applied to f1 and f3 before transformer)
  time_conditioning_mode: additive    # "additive" | "film" | "residual_adaln"
                                      # additive:      x += MLP(time_feat), zero-init → identity
                                      # film:          x * (1+gamma) + beta, zero-init → identity
                                      # residual_adaln: x + alpha*AdaLN(x,gamma,beta), alpha=0 init
  time_hidden_dim: 256                # hidden dim of EndpointTimeEncoder MLP

  # Spatial attention
  use_rope_in_self_attention: true    # 2D RoPE over S×T grid in self-attention (recommended)

  # Point head
  init_point_head_from_vggt: true     # initialize DPTHead from pretrained VGGT weights
  cache_layers: [4, 11, 17, 23]       # exactly 4 entries required for DPTHead

  # Memory
  use_gradient_checkpoint: true      # gradient-checkpoint temporal transformer blocks
